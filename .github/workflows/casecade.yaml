# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # First job
  job1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Echo command 1
        run: echo "This is the first job with echo command 1"

  # Second job - depends on job1
  job2:
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Echo command 2
        run: echo "This is the second job with echo command 2"

  # Third job - depends on job2
  job3:
    needs: job2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Echo command 3
        run: echo "This is the third job with echo command 3"
